name = "telegram-mastodon-worker"
main = "src/index.js"
compatibility_date = "2026-06-13"

# 先创建 KV namespace：
# npx wrangler kv namespace create CONFIG_KV
# 然后把返回的 id 填到下面。
[[kv_namespaces]]
binding = "CONFIG_KV"
id = "79e58045a2b341b8a15da2bb0c8a70de"

# 非敏感配置可以放在这里；敏感配置请使用 wrangler secret put。
[vars]
# 默认 Mastodon 实例：可选。没有设置时，代码内置默认使用 https://jiong.us。
DEFAULT_MASTODON_INSTANCE = "https://jiong.us"

# Mastodon 默认发文可见性：public / unlisted / private / direct
MASTODON_VISIBILITY = "public"

# Mastodon 默认最大字数。常见实例为 500，部分实例可能更高。
MAX_STATUS_LENGTH = "500"

# 可选：发布内容前后缀。
STATUS_PREFIX = ""
STATUS_SUFFIX = ""

[triggers]
crons = ["*/5 * * * *"]
